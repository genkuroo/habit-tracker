<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Habit Tracker</h1>
      <p class="subtitle">A small daily check-in.</p>
    </header>

    <section class="habits">
      <h2>Today</h2>
      <ul class="habit-list">
        <li class="habit">
          <span class="habit-name">Read for 20 minutes</span>
          <span class="habit-category">learn</span>
        </li>
        <li class="habit">
          <span class="habit-name">Walk outside</span>
          <span class="habit-category">health</span>
        </li>
        <li class="habit">
          <span class="habit-name">Write a journal entry</span>
          <span class="habit-category">reflect</span>
        </li>
      </ul>
    </section>

    <footer class="app-footer">
      <p>Phase 1 &middot; static page on Cloudflare Pages.</p>
    </footer>
  </main>
</body>
</html>
