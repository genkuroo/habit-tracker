<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Habit Tracker</h1>
      <p class="subtitle">A small daily check-in.</p>
    </header>

    <section class="habits">
      <h2>Today</h2>

      <div class="error-banner" id="error-banner" hidden></div>

      <form class="habit-form" id="habit-form">
        <input type="text" name="name" placeholder="Habit name" required>
        <input type="text" name="category" placeholder="Category" required>
        <button type="submit">Add</button>
      </form>

      <ul class="habit-list" id="habit-list">
        <li class="habit habit-loading">Loading…</li>
      </ul>
    </section>

    <footer class="app-footer">
      <p>Phase 3 &middot; habits persisted in Cloudflare KV.</p>
    </footer>
  </main>

  <script>
    const list = document.getElementById('habit-list');
    const form = document.getElementById('habit-form');
    const banner = document.getElementById('error-banner');

    function showError(message) {
      banner.textContent = message;
      banner.hidden = false;
    }

    function clearError() {
      banner.hidden = true;
    }

    async function loadHabits() {
      clearError();
      try {
        const res = await fetch('/api/habits');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const habits = await res.json();

        if (habits.length === 0) {
          const li = document.createElement('li');
          li.className = 'habit habit-empty';
          li.textContent = 'No habits yet. Add one above.';
          list.replaceChildren(li);
          return;
        }

        list.replaceChildren(...habits.map(renderHabit));
      } catch (err) {
        const li = document.createElement('li');
        li.className = 'habit habit-error';
        li.textContent = 'Could not load habits: ' + err.message;
        list.replaceChildren(li);
      }
    }

    function renderHabit(habit) {
      const li = document.createElement('li');
      li.className = 'habit';

      const name = document.createElement('span');
      name.className = 'habit-name';
      name.textContent = habit.name;

      const cat = document.createElement('span');
      cat.className = 'habit-category';
      cat.textContent = habit.category;

      const del = document.createElement('button');
      del.className = 'habit-delete';
      del.type = 'button';
      del.textContent = 'Delete';
      del.addEventListener('click', () => deleteHabit(habit.id));

      li.append(name, cat, del);
      return li;
    }

    async function deleteHabit(id) {
      if (!confirm('Delete this habit?')) return;
      clearError();
      const res = await fetch('/api/habits/' + encodeURIComponent(id), { method: 'DELETE' });
      if (!res.ok) {
        showError('Could not delete habit (HTTP ' + res.status + ')');
        return;
      }
      loadHabits();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const data = new FormData(form);
      const body = { name: data.get('name'), category: data.get('category') };

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/habits', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          showError('Could not create habit (HTTP ' + res.status + ')');
          return;
        }

        form.reset();
        loadHabits();
      } finally {
        submitBtn.disabled = false;
      }
    });

    loadHabits();
  </script>
</body>
</html>
</content>
</invoke>
